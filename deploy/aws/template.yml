AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: DotBot production GameLift allocation and persistence relay

Parameters:
  FleetId:
    Type: String
    Default: pending-quota-approval
  ControlPlaneUrl:
    Type: String
    Default: https://dotbot-jpawns5vla-uc.a.run.app
  RelaySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-east-1:380314682423:secret:dotbot/production/persistence-relay-V5v6wq

Resources:
  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: dotbot-game-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: DotBot
        - Key: Environment
          Value: production

  MatchmakerApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - content-type
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 600

  MatchmakerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: dotbot-production-matchmaker
      Description: Allocates GameLift rooms and relays authoritative persistence
      Runtime: nodejs24.x
      Architectures:
        - arm64
      Handler: handler.handler
      CodeUri: ../../apps/matchmaker/dist
      Role: arn:aws:iam::380314682423:role/DotBotMatchmakerRole
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref SessionsTable
          FLEET_ID: !Ref FleetId
          GAMELIFT_REGION: ca-central-1
          CONTROL_PLANE_URL: !Ref ControlPlaneUrl
          RELAY_SECRET_ARN: !Ref RelaySecretArn
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref MatchmakerApi
            Path: /health
            Method: GET
        CreateRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref MatchmakerApi
            Path: /rooms
            Method: POST
        JoinRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref MatchmakerApi
            Path: /rooms/{roomCode}/join
            Method: POST
      Tags:
        Project: DotBot
        Environment: production

  MatchmakerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: /aws/lambda/dotbot-production-matchmaker
      RetentionInDays: 14

Outputs:
  MatchmakerUrl:
    Description: Public allocation API base URL
    Value: !Sub https://${MatchmakerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/
  MatchmakerFunctionName:
    Value: !Ref MatchmakerFunction
  SessionsTableName:
    Value: !Ref SessionsTable
